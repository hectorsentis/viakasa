<!-- @dsCard group="Components" viewport="700x430" name="Marketing — Section heading & Service cards" subtitle="Eyebrow/title rhythm and service tiles" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-sans);padding:28px}
  i[data-lucide]{width:24px;height:24px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head><body>
<div id="root"></div>
<script type="text/babel">
  const { SectionHeading, ServiceCard } = window.ViakasaDesignSystem_53b05d;
  const Ico = ({n}) => <i data-lucide={n}></i>;
  function Demo(){
    return (
      <div style={{display:'flex',flexDirection:'column',gap:28}}>
        <SectionHeading align="center" eyebrow="Nuestros servicios"
          title="Acompañamiento integral, de principio a fin"
          intro="Compra, venta y gestión con asesoramiento legal y financiero, un único interlocutor de confianza."/>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:18}}>
          <ServiceCard accent icon={<Ico n="home"/>} title="Compra y venta" description="Valoración, negociación y cierre sin complicaciones."/>
          <ServiceCard icon={<Ico n="scale"/>} title="Asesoría legal" description="Contratos, notaría y registro con respaldo jurídico."/>
          <ServiceCard icon={<Ico n="landmark"/>} title="Financiación" description="Estudio hipotecario y mejores condiciones del mercado."/>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  setTimeout(()=>window.lucide&&window.lucide.createIcons(),60);
</script>
</body></html>
