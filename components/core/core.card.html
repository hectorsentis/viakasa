<!-- @dsCard group="Components" viewport="700x340" name="Core — Buttons, Badges, Inputs" subtitle="Actions, status labels & form fields" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-sans);padding:24px}
  .grid{display:flex;flex-direction:column;gap:22px}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .lbl{font-family:var(--font-brand);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gray-500);width:100%;margin-bottom:-6px}
  i[data-lucide]{width:16px;height:16px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head><body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Badge, Input } = window.ViakasaDesignSystem_53b05d;
  const Ico = ({n}) => <i data-lucide={n}></i>;
  function Demo(){
    return (
      <div className="grid">
        <div className="row"><span className="lbl">Buttons</span>
          <Button variant="primary">Ver propiedades</Button>
          <Button variant="accent" iconRight={<Ico n="arrow-right"/>}>Valoración gratuita</Button>
          <Button variant="outline">Contactar</Button>
          <Button variant="ghost">Cancelar</Button>
          <Button variant="link">Más información</Button>
        </div>
        <div className="row"><span className="lbl">Sizes &amp; disabled</span>
          <Button size="sm" variant="primary">Pequeño</Button>
          <Button size="md" variant="primary">Mediano</Button>
          <Button size="lg" variant="primary">Grande</Button>
          <Button variant="accent" disabled>Deshabilitado</Button>
        </div>
        <div className="row"><span className="lbl">Badges</span>
          <Badge variant="gold" tone="solid">Destacado</Badge>
          <Badge variant="success">En venta</Badge>
          <Badge variant="navy" tone="line">Obra nueva</Badge>
          <Badge variant="danger">Vendido</Badge>
          <Badge variant="neutral">Alquiler</Badge>
        </div>
        <div className="row" style={{alignItems:'flex-start'}}><span className="lbl">Inputs</span>
          <div style={{width:240}}><Input label="Nombre" placeholder="Tu nombre"/></div>
          <div style={{width:240}}><Input label="Email" type="email" iconLeft={<Ico n="mail"/>} hint="Respuesta en 24h"/></div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  setTimeout(()=>window.lucide&&window.lucide.createIcons(),60);
</script>
</body></html>
