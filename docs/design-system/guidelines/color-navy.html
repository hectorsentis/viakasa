<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-sans);padding:18px}
  .row{display:flex;gap:0}
  .sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:8px;box-sizing:border-box}
  .sw span{font-family:var(--font-brand);font-size:10px;letter-spacing:.08em;font-weight:600;color:#fff}
  .lbl{display:flex;gap:0;margin-top:8px}
  .lbl div{flex:1;font-size:10px;color:var(--gray-500);padding-left:8px}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:var(--navy-900)"><span>900</span></div>
    <div class="sw" style="background:var(--navy-800)"><span>800</span></div>
    <div class="sw" style="background:var(--navy-700)"><span>700</span></div>
    <div class="sw" style="background:var(--navy-500)"><span>500</span></div>
    <div class="sw" style="background:var(--navy-300)"><span style="color:var(--navy-900)">300</span></div>
    <div class="sw" style="background:var(--navy-100)"><span style="color:var(--navy-900)">100</span></div>
  </div>
  <div class="lbl">
    <div>#0C1A2E</div><div>#0F2138 ·brand</div><div>#163152</div><div>#2F5680</div><div>#8AA2BE</div><div>#E2E9F0</div>
  </div>
</body></html>
