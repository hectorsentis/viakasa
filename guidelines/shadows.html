<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">

</style></head><body>
  <div class="b"><div class="sq" style="box-shadow:var(--shadow-sm)"></div><div class="n">SM</div></div>
  <div class="b"><div class="sq" style="box-shadow:var(--shadow-md)"></div><div class="n">MD</div></div>
  <div class="b"><div class="sq" style="box-shadow:var(--shadow-lg)"></div><div class="n">LG</div></div>
  <div class="b"><div class="sq" style="box-shadow:var(--shadow-xl)"></div><div class="n">XL</div></div>
  <div class="b"><div class="sq" style="box-shadow:var(--shadow-gold)"></div><div class="n">GOLD</div></div>
</body></html>
