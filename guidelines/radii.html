<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="Modest radii — formal, not playful" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-sans);padding:20px 24px;display:flex;gap:20px;align-items:flex-end}
  .b{text-align:center}
  .sq{width:72px;height:56px;background:var(--white);border:1.5px solid var(--gold-400);box-shadow:var(--shadow-sm)}
  .n{font-family:var(--font-brand);font-size:10px;letter-spacing:.08em;color:var(--gray-600);margin-top:8px}
</style></head><body>
  <div class="b"><div class="sq" style="border-radius:var(--radius-xs)"></div><div class="n">XS·2</div></div>
  <div class="b"><div class="sq" style="border-radius:var(--radius-sm)"></div><div class="n">SM·4</div></div>
  <div class="b"><div class="sq" style="border-radius:var(--radius-md)"></div><div class="n">MD·6</div></div>
  <div class="b"><div class="sq" style="border-radius:var(--radius-lg)"></div><div class="n">LG·10</div></div>
  <div class="b"><div class="sq" style="border-radius:var(--radius-xl)"></div><div class="n">XL·16</div></div>
  <div class="b"><div class="sq" style="border-radius:var(--radius-pill);width:96px"></div><div class="n">PILL</div></div>
</body></html>
