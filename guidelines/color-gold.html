<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-sans);padding:18px}
  .row{display:flex;gap:0}
  .sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:8px;box-sizing:border-box}
  .sw span{font-family:var(--font-brand);font-size:10px;letter-spacing:.08em;font-weight:600}
  .lbl{display:flex;gap:0;margin-top:8px}
  .lbl div{flex:1;font-size:10px;color:var(--gray-500);font-family:var(--font-sans);padding-left:8px}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:var(--gold-100)"><span style="color:var(--gold-800)">100</span></div>
    <div class="sw" style="background:var(--gold-300)"><span style="color:var(--gold-900)">300</span></div>
    <div class="sw" style="background:var(--gold-500)"><span style="color:var(--navy-900)">500</span></div>
    <div class="sw" style="background:var(--gold-600)"><span style="color:#fff">600</span></div>
    <div class="sw" style="background:var(--gold-700)"><span style="color:#fff">700</span></div>
    <div class="sw" style="background:var(--gold-900)"><span style="color:#fff">900</span></div>
  </div>
  <div class="lbl">
    <div>#F1E2BE</div><div>#D9B567</div><div>#C19A4B ·brand</div><div>#B08C40</div><div>#A07E38</div><div>#6E561F</div>
  </div>
</body></html>
