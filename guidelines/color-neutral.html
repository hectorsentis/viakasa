<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — ivory & ink" subtitle="Warm ivory paper, cool ink text, working grays" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-sans);padding:18px}
  .row{display:flex;gap:0}
  .sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:8px;box-sizing:border-box;border:1px solid var(--gray-200)}
  .sw span{font-size:10px;letter-spacing:.04em;font-weight:600;font-family:var(--font-brand)}
  .lbl{display:flex;gap:0;margin-top:8px}
  .lbl div{flex:1;font-size:10px;color:var(--gray-500);padding-left:8px}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:var(--ink)"><span style="color:#fff">Ink</span></div>
    <div class="sw" style="background:var(--gray-500)"><span style="color:#fff">Gray 500</span></div>
    <div class="sw" style="background:var(--gray-200)"><span style="color:var(--ink)">Gray 200</span></div>
    <div class="sw" style="background:var(--paper-warm)"><span style="color:var(--ink)">Paper warm</span></div>
    <div class="sw" style="background:var(--paper)"><span style="color:var(--ink)">Paper</span></div>
    <div class="sw" style="background:var(--white)"><span style="color:var(--ink)">White</span></div>
  </div>
  <div class="lbl">
    <div>#14202E</div><div>#7A8794</div><div>#E3E8ED</div><div>#F4EFE6</div><div>#FAF8F3</div><div>#FFFFFF</div>
  </div>
</body></html>
